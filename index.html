<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoWire Support & Legal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3B82F6;
            --bg: #0F172A;
            --card: #1E293B;
            --text: #F8FAFC;
            --subtext: #94A3B8;
            --border: rgba(255, 255, 255, 0.08);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }
        .logo {
            font-size: 48px;
            margin-bottom: 16px;
        }
        h1 {
            font-weight: 800;
            margin-bottom: 8px;
            font-size: 24px;
        }
        p {
            color: var(--subtext);
            margin-bottom: 32px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .link-btn {
            display: block;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s;
        }
        .link-btn:hover {
            background: rgba(59, 130, 246, 0.1);
            border-color: var(--primary);
            color: var(--primary);
            transform: translateY(-2px);
        }
        .footer {
            margin-top: 40px;
            font-size: 12px;
            color: var(--subtext);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">⚡</div>
        <h1>AutoWire</h1>
        <p>Legal & Support Documentation</p>

        <div class="links">
            <a href="privacy_policy.html" class="link-btn">Privacy Policy</a>
            <a href="terms_of_service.html" class="link-btn">Terms of Service</a>
            <a href="delete_account.html" class="link-btn">Account Deletion Request</a>
        </div>

        <div class="footer">
            &copy; 2026 Ahsan Studio. All rights reserved.
        </div>
    </div>
</body>
</html>
